<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Health</title>
<style>
  :root{
    --bg:#0e1116; --card:#171c24; --border:#2a3240; --text:#e8ecf1;
    --muted:#9aa5b1; --accent:#4cc38a; --accent2:#5aa9e6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh; padding:max(24px,env(safe-area-inset-top)) 20px 40px;
  }
  .wrap{max-width:640px;margin:0 auto}
  header{margin:32px 0 28px}
  h1{font-size:2rem;font-weight:800;letter-spacing:-.02em}
  h1 .dot{color:var(--accent)}
  .sub{color:var(--muted);margin-top:6px;font-size:.95rem}
  a.card{
    display:block; background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:22px 20px; text-decoration:none; color:var(--text);
    margin-bottom:14px; transition:border-color .15s;
  }
  a.card:active,a.card:hover{border-color:var(--accent)}
  .card h2{font-size:1.25rem;font-weight:700;display:flex;align-items:center;gap:10px}
  .card p{color:var(--muted);margin-top:6px;font-size:.92rem;line-height:1.45}
  .arrow{margin-left:auto;color:var(--accent);font-size:1.2rem}
  footer{margin-top:40px;color:var(--muted);font-size:.8rem;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Health<span class="dot">.</span></h1>
    <p class="sub">Jeb's training &amp; health hub</p>
  </header>

  <a class="card" href="training-plan/">
    <h2>Training Plan <span class="arrow">&rarr;</span></h2>
    <p>3 lifts/week in supersets &middot; Norway 4&times;4 + REHIT cardio &middot; mobility &middot; recovery rules. Built for use mid-workout.</p>
  </a>

  <footer>More sections coming as they're built.</footer>
</div>
</body>
</html>
